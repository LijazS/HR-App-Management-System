apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: lijaz-namespace
spec:
  parentRefs:
    - name: http
      namespace: kgateway-system
  hostnames:
    - "frontend.local"   # fake internal hostname
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"          # root path
      backendRefs:
        - name: hr-service
          port: 3000            # Service port