apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: lijaz-namespace
spec:
  parentRefs:
    - name: http
      namespace: kgateway-system
  hostnames:
    - "65.2.148.126"       # public IP, no domain needed
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"      # root path
      backendRefs:
        - name: hr-service    # your Kubernetes Service name
          port: 3000   